name: CI/CD — Platform API

on:
  push:
    branches: [main]
    paths: ['apps/**', 'deploy/helm/**', '.github/workflows/ci.yaml']
  pull_request:
    branches: [main]
    paths: ['apps/**', 'deploy/helm/**', '.github/workflows/ci.yaml']

env:
  PROJECT_ID: infra-learning-pdtung1605
  REGION: asia-southeast1
  REPO: platform-images
  IMAGE: platform-api

jobs:
  # ─── Job 1: Test (PR + push) ───────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: apps/platform-api/go.sum

      - name: Run tests
        run: cd apps/platform-api && go test ./...

  # ─── Job 2: Build + Deploy (only on push to main) ──────
  build-deploy:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "SHORT_SHA=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      # ── Auth ──
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/866925958777/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@infra-learning-pdtung1605.iam.gserviceaccount.com'

      # ── Build & Push ──
      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & Push
        run: |
          IMAGE_TAG=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ steps.vars.outputs.SHORT_SHA }}
          docker build \
            --build-arg VERSION=${{ steps.vars.outputs.SHORT_SHA }} \
            -t $IMAGE_TAG \
            apps/platform-api/
          docker push $IMAGE_TAG

      - name: Trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ steps.vars.outputs.SHORT_SHA }}
          severity: 'CRITICAL'
          exit-code: '1'

      - name: Install Helm
        uses: azure/setup-helm@v4

      # ── Deploy to STAGING ──
      - name: Get staging credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: staging-cluster
          location: ${{ env.REGION }}-a
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy to staging
        run: |
          helm upgrade --install platform-api deploy/helm/platform-api \
            -n staging --create-namespace \
            -f deploy/helm/platform-api/values.yaml \
            -f deploy/helm/platform-api/values-staging.yaml \
            --set image.tag=${{ steps.vars.outputs.SHORT_SHA }} \
            --wait --timeout 5m

      - name: Smoke test staging
        run: |
          kubectl port-forward svc/platform-api 9090:80 -n staging &
          PF_PID=$!
          sleep 5
          for i in $(seq 1 5); do
            STATUS=$(curl -sf --max-time 5 http://localhost:9090/health | jq -r .status 2>/dev/null || echo "")
            if [ "$STATUS" = "ok" ]; then
              echo "✅ Staging smoke test passed on attempt $i"
              kill $PF_PID 2>/dev/null
              exit 0
            fi
            echo "Attempt $i/5: status=$STATUS, retrying in 10s..."
            sleep 10
          done
          kill $PF_PID 2>/dev/null
          echo "❌ Staging smoke test failed"
          exit 1

      # ── Deploy to PRODUCTION ──
      - name: Get prod credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: prod-cluster
          location: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy to production
        run: |
          helm upgrade --install platform-api deploy/helm/platform-api \
            -n production \
            -f deploy/helm/platform-api/values.yaml \
            -f deploy/helm/platform-api/values-prod.yaml \
            --set image.tag=${{ steps.vars.outputs.SHORT_SHA }} \
            --set replicaCount=1 \
            --set hpa.enabled=false \
            --set pdb.enabled=false \
            --wait --timeout 8m

      - name: Smoke test production
        run: |
          echo "Waiting for LB to register new pod..."
          for i in $(seq 1 10); do
            STATUS=$(curl -sf --max-time 10 https://platform.duy-tung.dev/health | jq -r .status 2>/dev/null || echo "")
            if [ "$STATUS" = "ok" ]; then
              echo "✅ Production smoke test passed on attempt $i"
              exit 0
            fi
            echo "Attempt $i/10: status=$STATUS, retrying in 15s..."
            sleep 15
          done
          echo "❌ Production smoke test failed"
          exit 1

      # ── Update image tag in repo ──
      - name: Update values image tags
        run: |
          SHORT_SHA=${{ steps.vars.outputs.SHORT_SHA }}
          sed -i "s|  tag: .*|  tag: \"${SHORT_SHA}\"|" deploy/helm/platform-api/values-prod.yaml
          sed -i "s|  tag: .*|  tag: \"${SHORT_SHA}\"|" deploy/helm/platform-api/values.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/helm/platform-api/values-prod.yaml deploy/helm/platform-api/values.yaml
          git commit -m "ci: update image to ${SHORT_SHA} [skip ci]" || exit 0
          git push origin main
