name: CI — Platform API

on:
  push:
    branches: [main]
    paths: ['apps/**', '.github/workflows/ci.yaml']
  pull_request:
    branches: [main]
    paths: ['apps/**', 'deploy/helm/**', '.github/workflows/ci.yaml']

env:
  PROJECT_ID: infra-learning-pdtung1605
  REGION: asia-southeast1
  REPO: platform-images
  IMAGE: platform-api

jobs:
  # ─── Job 1: Test (PR + push) ───────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: apps/platform-api/go.sum

      - name: Go cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('apps/platform-api/go.sum') }}
          restore-keys: go-${{ runner.os }}-

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: apps/platform-api

      - name: Test (race + coverage)
        run: |
          cd apps/platform-api
          go test -race -coverprofile=coverage.out -covermode=atomic ./... || true
          if [ -f coverage.out ]; then
            COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}')
            echo "### 📊 Test Coverage: ${COVERAGE}" >> $GITHUB_STEP_SUMMARY
          else
            echo "### 📊 Test Coverage: no test files" >> $GITHUB_STEP_SUMMARY
          fi

  # ─── Job 2: Build + Push (only on merge to main) ───────
  # ArgoCD Image Updater auto-detects new tags and deploys.
  # CI only: test → build → Trivy scan → push. No git commits needed.
  build:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "SHORT_SHA=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      # ── Auth ──
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/866925958777/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@infra-learning-pdtung1605.iam.gserviceaccount.com'

      # ── Build ──
      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build
        run: |
          IMAGE_TAG=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ steps.vars.outputs.SHORT_SHA }}
          docker build \
            --build-arg VERSION=${{ steps.vars.outputs.SHORT_SHA }} \
            -t $IMAGE_TAG \
            apps/platform-api/

      # ── Security scan (BEFORE push) ──
      - name: Trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ steps.vars.outputs.SHORT_SHA }}
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      # ── Push (only if scan passed) ──
      - name: Push image
        run: |
          IMAGE_TAG=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ steps.vars.outputs.SHORT_SHA }}
          docker push $IMAGE_TAG

      - name: Summary
        run: |
          echo "### ✅ Image pushed" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: \`${{ steps.vars.outputs.SHORT_SHA }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- ArgoCD Image Updater will auto-detect and deploy" >> $GITHUB_STEP_SUMMARY

      # ── Slack notification ──
      - name: Notify Slack
        if: always() && vars.SLACK_ENABLED == 'true'
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} CI Build ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ job.status == 'success' && '✅' || '❌' }} *CI Build — platform-api*\n• Status: `${{ job.status }}`\n• Tag: `${{ steps.vars.outputs.SHORT_SHA }}`\n• Actor: ${{ github.actor }}\n• <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }
