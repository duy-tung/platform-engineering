name: CI — Platform API

on:
  push:
    branches: [main]
    paths: ['apps/**', 'deploy/helm/**', '.github/workflows/ci.yaml']
  pull_request:
    branches: [main]
    paths: ['apps/**', 'deploy/helm/**', '.github/workflows/ci.yaml']

env:
  PROJECT_ID: infra-learning-pdtung1605
  REGION: asia-southeast1
  REPO: platform-images
  IMAGE: platform-api

jobs:
  # ─── Job 1: Test (PR + push) ───────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: apps/platform-api/go.sum

      - name: Run tests
        run: cd apps/platform-api && go test ./...

  # ─── Job 2: Build + Push (only on push to main) ────────
  # ArgoCD watches the Git repo and auto-syncs deployments.
  # CI only: test → build → push → Trivy → commit tag.
  build:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "SHORT_SHA=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      # ── Auth ──
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/866925958777/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@infra-learning-pdtung1605.iam.gserviceaccount.com'

      # ── Build & Push ──
      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & Push
        run: |
          IMAGE_TAG=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ steps.vars.outputs.SHORT_SHA }}
          docker build \
            --build-arg VERSION=${{ steps.vars.outputs.SHORT_SHA }} \
            -t $IMAGE_TAG \
            apps/platform-api/
          docker push $IMAGE_TAG

      - name: Trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ steps.vars.outputs.SHORT_SHA }}
          severity: 'CRITICAL'
          exit-code: '1'

      # ── Update image tag → ArgoCD auto-syncs ──
      - name: Update image tag in values files
        run: |
          SHORT_SHA=${{ steps.vars.outputs.SHORT_SHA }}
          sed -i "s|  tag: .*|  tag: \"${SHORT_SHA}\"|" deploy/helm/platform-api/values-prod.yaml
          sed -i "s|  tag: .*|  tag: \"${SHORT_SHA}\"|" deploy/helm/platform-api/values.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/helm/platform-api/values-prod.yaml deploy/helm/platform-api/values.yaml
          git commit -m "ci: update image to ${SHORT_SHA} [skip ci]" || exit 0
          git push origin main
