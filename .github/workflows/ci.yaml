name: Build & Deploy

on:
  push:
    branches: [main]
    paths: ['apps/**']
  pull_request:
    branches: [main]
    paths: ['apps/**']

env:
  PROJECT_ID: infra-learning-pdtung1605
  REGION: asia-southeast1
  REPO: platform-images
  IMAGE: platform-api

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "SHORT_SHA=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: apps/platform-api/go.sum

      - name: Run tests
        run: cd apps/platform-api && go test ./...

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/866925958777/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@infra-learning-pdtung1605.iam.gserviceaccount.com'

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & Push
        run: |
          IMAGE_TAG=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ steps.vars.outputs.SHORT_SHA }}
          docker build -t $IMAGE_TAG apps/platform-api/
          docker push $IMAGE_TAG

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ steps.vars.outputs.SHORT_SHA }}
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      # Update Helm values image tag (only on push to main)
      - name: Update Helm image tag
        if: github.event_name == 'push'
        run: |
          SHORT_SHA=${{ steps.vars.outputs.SHORT_SHA }}
          sed -i "s|  tag: .*|  tag: \"${SHORT_SHA}\"|" deploy/helm/platform-api/values.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/
          git commit -m "ci: update image to ${SHORT_SHA}" || exit 0
          git push origin main
