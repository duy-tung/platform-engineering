name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/**'
      - 'modules/**'
      - 'week*/**'

env:
  TF_DIR: week2-gke

jobs:
  plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0

      # Auth với GCP
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/866925958777/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@infra-learning-pdtung1605.iam.gserviceaccount.com'

      - name: Terraform Init
        run: terraform -chdir=${{ env.TF_DIR }} init

      - name: Terraform Validate
        run: terraform -chdir=${{ env.TF_DIR }} validate

      - name: Terraform Plan
        id: plan
        run: terraform -chdir=${{ env.TF_DIR }} plan -no-color -out=plan.out
        continue-on-error: true

      # Comment plan output lên PR
      - name: Comment Plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const output = `### Terraform Plan 🏗️
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            *Pushed by: @${{ github.actor }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  # ---- Infracost: Ước tính chi phí ----
  infracost:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/866925958777/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@infra-learning-pdtung1605.iam.gserviceaccount.com'

      - name: Terraform Init
        run: terraform -chdir=${{ env.TF_DIR }} init -input=false

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      # Tạo cost baseline từ main branch
      - name: Generate Infracost baseline
        run: |
          git fetch origin main:refs/remotes/origin/main
          git checkout origin/main -- ${{ env.TF_DIR }}
          infracost breakdown --path=${{ env.TF_DIR }} \
            --format=json --out-file=/tmp/infracost-base.json
          git checkout -- ${{ env.TF_DIR }}

      # Tạo cost từ PR branch
      - name: Generate Infracost diff
        run: |
          infracost diff --path=${{ env.TF_DIR }} \
            --compare-to=/tmp/infracost-base.json \
            --format=json --out-file=/tmp/infracost-diff.json

      - name: Post cost comment
        run: |
          infracost comment github \
            --path=/tmp/infracost-diff.json \
            --repo=${{ github.repository }} \
            --pull-request=${{ github.event.pull_request.number }} \
            --github-token=${{ github.token }} \
            --behavior=update


