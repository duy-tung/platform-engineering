name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-plan.yaml'

env:
  TF_VERSION: '1.9.0'
  PROJECT_ID: 'infra-learning-pdtung1605'

jobs:
  plan:
    strategy:
      matrix:
        env: [staging, prod]
    name: Plan ${{ matrix.env }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/866925958777/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@infra-learning-pdtung1605.iam.gserviceaccount.com'

      # Security scan
      - name: tfsec scan
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform/
          soft_fail: true
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Terraform Init
        run: terraform -chdir=terraform/environments/${{ matrix.env }} init -input=false

      - name: Terraform Validate
        run: terraform -chdir=terraform/environments/${{ matrix.env }} validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform -chdir=terraform/environments/${{ matrix.env }} plan \
            -var="project_id=${{ env.PROJECT_ID }}" \
            -no-color -out=tfplan 2>&1 | tee plan.txt
        continue-on-error: true

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let plan = fs.readFileSync('plan.txt', 'utf8');
            const maxLen = 60000;
            if (plan.length > maxLen) plan = plan.substring(0, maxLen) + '\n... (truncated)';
            const status = '${{ steps.plan.outcome }}' === 'success' ? '✅' : '❌';
            const output = `### ${status} Terraform Plan — ${{ matrix.env }}\n\`\`\`\n${plan}\n\`\`\`\n*Pushed by: @${{ github.actor }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1
