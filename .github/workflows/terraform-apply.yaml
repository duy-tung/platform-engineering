name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-apply.yaml'

env:
  TF_VERSION: '1.9.0'
  PROJECT_ID: 'infra-learning-pdtung1605'

jobs:
  # ─── Detect which environments changed ────────────────
  detect:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      staging: ${{ steps.filter.outputs.staging }}
      prod: ${{ steps.filter.outputs.prod }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            staging:
              - 'terraform/environments/staging/**'
              - '.github/workflows/terraform-apply.yaml'
            prod:
              - 'terraform/environments/prod/**'
              - '.github/workflows/terraform-apply.yaml'

  # ─── Apply staging (runs first) ────────────────────────
  apply-staging:
    name: Apply staging
    needs: detect
    if: needs.detect.outputs.staging == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: terraform-staging
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/866925958777/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@infra-learning-pdtung1605.iam.gserviceaccount.com'

      - name: Terraform Init
        run: terraform -chdir=terraform/environments/staging init -input=false

      - name: Terraform Apply
        run: |
          terraform -chdir=terraform/environments/staging apply \
            -var="project_id=${{ env.PROJECT_ID }}" \
            -auto-approve -input=false

      # ── Slack notification ──
      - name: Notify Slack
        if: always() && vars.SLACK_ENABLED == 'true'
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} TF Apply staging ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ job.status == 'success' && '✅' || '❌' }} *Terraform Apply — staging*\n• Status: `${{ job.status }}`\n• Actor: ${{ github.actor }}\n• <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }

  # ─── Apply prod (after staging, with approval gate) ───
  apply-prod:
    name: Apply prod
    needs: [detect, apply-staging]
    if: >-
      always() &&
      needs.detect.outputs.prod == 'true' &&
      (needs.apply-staging.result == 'success' || needs.apply-staging.result == 'skipped')
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: terraform-prod
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/866925958777/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@infra-learning-pdtung1605.iam.gserviceaccount.com'

      - name: Terraform Init
        run: terraform -chdir=terraform/environments/prod init -input=false

      - name: Terraform Apply
        env:
          TF_VAR_argocd_webhook_secret: ${{ secrets.ARGOCD_WEBHOOK_SECRET }}
        run: |
          terraform -chdir=terraform/environments/prod apply \
            -var="project_id=${{ env.PROJECT_ID }}" \
            -auto-approve -input=false

      # ── Slack notification ──
      - name: Notify Slack
        if: always() && vars.SLACK_ENABLED == 'true'
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} TF Apply prod ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ job.status == 'success' && '✅' || '❌' }} *Terraform Apply — prod*\n• Status: `${{ job.status }}`\n• Actor: ${{ github.actor }}\n• <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }
