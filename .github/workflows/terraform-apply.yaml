name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-apply.yaml'

env:
  TF_VERSION: '1.9.0'
  PROJECT_ID: 'infra-learning-pdtung1605'

jobs:
  # ─── Detect which environments changed ────────────────
  detect:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      staging: ${{ steps.filter.outputs.staging }}
      prod: ${{ steps.filter.outputs.prod }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            staging:
              - 'terraform/environments/staging/**'
              - '.github/workflows/terraform-apply.yaml'
            prod:
              - 'terraform/environments/prod/**'
              - '.github/workflows/terraform-apply.yaml'

  # ─── Apply staging (only if staging files changed) ────
  apply-staging:
    name: Apply staging
    needs: detect
    if: needs.detect.outputs.staging == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/866925958777/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@infra-learning-pdtung1605.iam.gserviceaccount.com'

      - name: Terraform Init
        run: terraform -chdir=terraform/environments/staging init -input=false

      - name: Terraform Apply
        env:
          TF_VAR_argocd_webhook_secret: ${{ secrets.ARGOCD_WEBHOOK_SECRET }}
        run: |
          terraform -chdir=terraform/environments/staging apply \
            -var="project_id=${{ env.PROJECT_ID }}" \
            -auto-approve -input=false

  # ─── Apply prod (only if prod files changed) ─────────
  apply-prod:
    name: Apply prod
    needs: detect
    if: needs.detect.outputs.prod == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/866925958777/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@infra-learning-pdtung1605.iam.gserviceaccount.com'

      - name: Terraform Init
        run: terraform -chdir=terraform/environments/prod init -input=false

      - name: Terraform Apply
        env:
          TF_VAR_argocd_webhook_secret: ${{ secrets.ARGOCD_WEBHOOK_SECRET }}
        run: |
          terraform -chdir=terraform/environments/prod apply \
            -var="project_id=${{ env.PROJECT_ID }}" \
            -auto-approve -input=false
