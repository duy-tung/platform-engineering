name: GitOps Validate

on:
  pull_request:
    branches: [main]
    paths:
      - 'deploy/**'
      - '.github/workflows/gitops-validate.yaml'

jobs:
  validate:
    name: Validate GitOps
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      # ── Helm lint ──
      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.16.0'

      - name: Helm lint platform-api
        run: |
          helm lint deploy/helm/platform-api \
            -f deploy/helm/platform-api/values.yaml \
            -f deploy/helm/platform-api/values-staging.yaml

      - name: Helm template dry-run (staging)
        id: template_staging
        run: |
          helm template platform-api deploy/helm/platform-api \
            -f deploy/helm/platform-api/values.yaml \
            -f deploy/helm/platform-api/values-staging.yaml \
            --namespace staging > /dev/null 2>&1
          echo "result=✅ Staging template OK" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Helm template dry-run (prod)
        id: template_prod
        run: |
          helm template platform-api deploy/helm/platform-api \
            -f deploy/helm/platform-api/values.yaml \
            -f deploy/helm/platform-api/values-prod.yaml \
            --namespace production > /dev/null 2>&1
          echo "result=✅ Prod template OK" >> $GITHUB_OUTPUT
        continue-on-error: true

      # ── YAML validation ──
      - name: Install yamllint
        run: pip install yamllint

      - name: YAML lint ArgoCD apps
        id: yamllint
        run: |
          yamllint -d relaxed deploy/argocd/ 2>&1 | head -50 || true
          echo "result=done" >> $GITHUB_OUTPUT
        continue-on-error: true

      # ── Comment on PR (dedup — update existing comment) ──
      - name: Find existing comment
        uses: peter-evans/find-comment@v3
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: 'GitOps Validation'

      - name: Comment validation results
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ### GitOps Validation
            | Check | Status |
            |---|---|
            | Helm template staging | ${{ steps.template_staging.outcome == 'success' && '✅' || '❌' }} |
            | Helm template prod | ${{ steps.template_prod.outcome == 'success' && '✅' || '❌' }} |
            | YAML lint | ${{ steps.yamllint.outcome == 'success' && '✅' || '⚠️' }} |

            *Pushed by: @${{ github.actor }}*
          edit-mode: replace

      - name: Fail if templates broken
        if: steps.template_staging.outcome == 'failure' || steps.template_prod.outcome == 'failure'
        run: exit 1
