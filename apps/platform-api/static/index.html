<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Platform API — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0f13;--surface:#1a1a24;--border:#2a2a3a;
  --text:#e4e4ef;--muted:#8888aa;--accent:#6c63ff;
  --accent2:#00d4aa;--danger:#ff5c6c;--warn:#ffb84d;
  --radius:12px;--shadow:0 4px 24px rgba(0,0,0,.4);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--accent);text-decoration:none}

/* Layout */
.container{max-width:960px;margin:0 auto;padding:24px 20px}
header{text-align:center;padding:40px 0 24px;position:relative}
header h1{font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header p{color:var(--muted);margin-top:6px;font-size:.9rem}

/* Status cards */
.status-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:28px}
.status-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:transform .2s}
.status-card:hover{transform:translateY(-2px)}
.status-card .label{font-size:.75rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px}
.status-card .value{font-size:1.1rem;font-weight:600}
.status-card .value.ok{color:var(--accent2)}
.status-card .value.err{color:var(--danger)}

/* Table */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.card-header h2{font-size:1.1rem;font-weight:600}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:.75rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:10px 12px;border-bottom:1px solid var(--border)}
td{padding:12px;border-bottom:1px solid var(--border);font-size:.9rem}
tr:hover td{background:rgba(108,99,255,.05)}
.empty-row td{text-align:center;color:var(--muted);padding:32px}

/* Buttons */
.btn{border:none;padding:8px 16px;border-radius:8px;font-family:inherit;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#5a52e0;transform:translateY(-1px)}
.btn-sm{padding:5px 10px;font-size:.8rem;border-radius:6px}
.btn-danger{background:transparent;color:var(--danger);border:1px solid var(--danger)}
.btn-danger:hover{background:var(--danger);color:#fff}
.btn-ghost{background:transparent;color:var(--accent);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.modal-overlay.active{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:90%;max-width:420px;box-shadow:var(--shadow)}
.modal h3{margin-bottom:16px;font-size:1.1rem}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:5px}
.form-group input{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:.9rem;outline:none;transition:border-color .2s}
.form-group input:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;font-size:.85rem;font-weight:500;opacity:0;transform:translateY(10px);transition:all .3s;z-index:200}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{background:var(--accent2);color:#000}
.toast.error{background:var(--danger);color:#fff}

/* Responsive */
@media(max-width:600px){
  .status-grid{grid-template-columns:1fr 1fr}
  table{font-size:.8rem}
  td,th{padding:8px}
}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>⚡ Platform API</h1>
    <p>Production-grade Kubernetes platform on GKE</p>
  </header>

  <!-- Status Cards -->
  <div class="status-grid">
    <div class="status-card">
      <div class="label">Health</div>
      <div class="value" id="health-status">loading...</div>
    </div>
    <div class="status-card">
      <div class="label">Version</div>
      <div class="value" id="version-value">—</div>
    </div>
    <div class="status-card">
      <div class="label">Database</div>
      <div class="value" id="db-status">loading...</div>
    </div>
    <div class="status-card">
      <div class="label">Users</div>
      <div class="value" id="user-count">—</div>
    </div>
  </div>

  <!-- Users Table -->
  <div class="card">
    <div class="card-header">
      <h2>👤 Users</h2>
      <button class="btn btn-primary" onclick="openModal()">+ Add User</button>
    </div>
    <table>
      <thead>
        <tr><th>ID</th><th>Name</th><th>Email</th><th>Created</th><th></th></tr>
      </thead>
      <tbody id="users-body">
        <tr class="empty-row"><td colspan="5">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">Add User</h3>
    <input type="hidden" id="edit-id">
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="input-name" placeholder="John Doe">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="input-email" placeholder="john@example.com">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveUser()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '';

async function fetchStatus() {
  try {
    const h = await fetch(`${API}/health`).then(r => r.json());
    el('health-status').textContent = h.status;
    el('health-status').className = 'value ' + (h.status === 'ok' ? 'ok' : 'err');
    el('version-value').textContent = h.version;
  } catch { el('health-status').textContent = 'error'; el('health-status').className = 'value err'; }

  try {
    const d = await fetch(`${API}/db-check`).then(r => r.json());
    el('db-status').textContent = d.status === 'ok' ? `ok (${d.latency})` : d.status;
    el('db-status').className = 'value ' + (d.status === 'ok' ? 'ok' : 'err');
  } catch { el('db-status').textContent = 'error'; el('db-status').className = 'value err'; }
}

async function loadUsers() {
  try {
    const users = await fetch(`${API}/users`).then(r => r.json());
    const tbody = el('users-body');
    el('user-count').textContent = users.length;
    if (!users.length) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="5">No users yet — add one!</td></tr>';
      return;
    }
    tbody.innerHTML = users.map(u => `
      <tr>
        <td>${u.id}</td>
        <td>${esc(u.name)}</td>
        <td>${esc(u.email)}</td>
        <td>${new Date(u.created_at).toLocaleDateString()}</td>
        <td>
          <button class="btn btn-sm btn-ghost" onclick="editUser(${u.id},'${esc(u.name)}','${esc(u.email)}')">Edit</button>
          <button class="btn btn-sm btn-danger" onclick="deleteUser(${u.id})">Del</button>
        </td>
      </tr>
    `).join('');
  } catch { el('users-body').innerHTML = '<tr class="empty-row"><td colspan="5">Failed to load users</td></tr>'; }
}

function openModal(id, name, email) {
  el('edit-id').value = id || '';
  el('input-name').value = name || '';
  el('input-email').value = email || '';
  el('modal-title').textContent = id ? 'Edit User' : 'Add User';
  el('modal').classList.add('active');
  el('input-name').focus();
}
function closeModal() { el('modal').classList.remove('active'); }

async function saveUser() {
  const id = el('edit-id').value;
  const body = { name: el('input-name').value, email: el('input-email').value };
  if (!body.name || !body.email) return toast('Name and email required', 'error');
  try {
    const url = id ? `${API}/users/${id}` : `${API}/users`;
    const method = id ? 'PUT' : 'POST';
    const r = await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    if (!r.ok) { const e = await r.json(); throw new Error(e.error); }
    toast(id ? 'User updated!' : 'User created!', 'success');
    closeModal(); loadUsers();
  } catch(e) { toast(e.message, 'error'); }
}

async function deleteUser(id) {
  if (!confirm('Delete this user?')) return;
  try {
    const r = await fetch(`${API}/users/${id}`, { method: 'DELETE' });
    if (!r.ok) throw new Error('Failed');
    toast('User deleted', 'success'); loadUsers();
  } catch(e) { toast(e.message, 'error'); }
}

function editUser(id, name, email) { openModal(id, name, email); }

function el(id) { return document.getElementById(id); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function toast(msg, type) {
  const t = el('toast'); t.textContent = msg; t.className = `toast show ${type}`;
  setTimeout(() => t.className = 'toast', 3000);
}

// Init
fetchStatus();
loadUsers();
setInterval(fetchStatus, 30000);

// Close modal on Escape
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
el('modal').addEventListener('click', e => { if (e.target === el('modal')) closeModal(); });
</script>
</body>
</html>
