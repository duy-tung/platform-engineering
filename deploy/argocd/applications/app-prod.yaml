apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-api-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/duy-tung/platform-engineering.git
    targetRevision: main
    path: deploy/k8s/overlays/prod
  destination:
    server: https://34.126.146.116
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
