apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: platform-gateway
  namespace: istio-system
spec:
  gatewayClassName: gke-l7-regional-external-managed
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: platform.duy-tung.dev
      tls:
        mode: Terminate
        options:
          networking.gke.io/cert-manager-certs: platform-cert
      allowedRoutes:
        namespaces:
          from: All
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
---
# HTTP → HTTPS redirect
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-redirect
  namespace: istio-system
spec:
  parentRefs:
    - name: platform-gateway
      namespace: istio-system
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kiali
  namespace: istio-system
spec:
  parentRefs:
    - name: platform-gateway
      namespace: istio-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /kiali
      backendRefs:
        - name: kiali
          port: 20001
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jaeger
  namespace: istio-system
spec:
  parentRefs:
    - name: platform-gateway
      namespace: istio-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /jaeger
      backendRefs:
        - name: tracing
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: platform-gateway
      namespace: istio-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /grafana
      backendRefs:
        - name: monitoring-grafana
          port: 80
---
# Platform API — routes UI + API + health endpoints
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: platform-api
  namespace: production
spec:
  parentRefs:
    - name: platform-gateway
      namespace: istio-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: platform-api
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /users
      backendRefs:
        - name: platform-api
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /db-check
      backendRefs:
        - name: platform-api
          port: 80
    - matches:
        - path:
            type: Exact
            value: /health
        - path:
            type: Exact
            value: /ready
        - path:
            type: Exact
            value: /version
      backendRefs:
        - name: platform-api
          port: 80
    - matches:
        - path:
            type: Exact
            value: /
      backendRefs:
        - name: platform-api
          port: 80
