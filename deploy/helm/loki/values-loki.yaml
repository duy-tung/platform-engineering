# Grafana Loki — single binary mode for log aggregation
# Lightweight config for e2-medium Spot nodes
loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  limits_config:
    retention_period: 48h
    max_query_length: 721h

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  tolerations:
    - key: "spot"
      operator: "Equal"
      value: "true"
      effect: "PreferNoSchedule"
  persistence:
    enabled: true
    size: 5Gi

# Disable components we don't need in single-binary mode
gateway:
  enabled: false
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# Monitoring
monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false

test:
  enabled: false
