# ---- App ----
replicaCount: 1

image:
  repository: asia-southeast1-docker.pkg.dev/infra-learning-pdtung1605/platform-images/platform-api
  tag: "c49072aa"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi

# ---- Database ----
# Mode: "incluster" (StatefulSet Postgres) or "cloudsql" (Cloud SQL Auth Proxy)
database:
  mode: incluster  # Override to "cloudsql" in prod

  # In-cluster PostgreSQL (staging/dev)
  incluster:
    enabled: true
    image: postgres:16-alpine
    storageSize: 10Gi
    storageClass: standard-rwo

  # Cloud SQL Auth Proxy (production)
  cloudsql:
    enabled: false
    connectionName: ""  # project:region:instance
    port: 5432
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.3

  # Credentials — NEVER hardcode in prod, use existingSecret
  credentials:
    user: platformuser
    password: ""  # Leave empty; use existingSecret for prod
    database: platformdb
    existingSecret: ""  # Set to secret name managed by External Secrets

# ---- Reliability (Prod) ----
hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilization: 70

pdb:
  enabled: false
  minAvailable: 2

# ---- Node scheduling ----
spot:
  enabled: true

nodeSelector:
  role: app

