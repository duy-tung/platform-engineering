{{- if not .Values.database.credentials.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  labels:
    {{- include "platform-api.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "platform-api.databaseUrl" . | quote }}
  {{- if eq .Values.database.mode "incluster" }}
  POSTGRES_USER: {{ .Values.database.credentials.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.database.credentials.password | quote }}
  POSTGRES_DB: {{ .Values.database.credentials.database | quote }}
  {{- end }}
{{- end }}
