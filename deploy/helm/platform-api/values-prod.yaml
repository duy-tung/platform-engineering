# Production: Cloud SQL, on-demand
# GitOps: ArgoCD syncs this file to prod-cluster automatically
replicaCount: 1  # Limited node capacity (2x e2-medium)

database:
  mode: cloudsql
  incluster:
    enabled: false
  cloudsql:
    enabled: true
    connectionName: "infra-learning-pdtung1605:asia-southeast1:platform-db"
    port: 5432
  credentials:
    existingSecret: db-secret-prod  # Managed by External Secrets Operator

# ---- Production reliability ----
# HPA/PDB disabled: single replica on constrained node pool
hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilization: 70

pdb:
  enabled: false
  minAvailable: 1

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

spot:
  enabled: false  # On-demand for prod

serviceAccountName: platform-api
serviceAccount:
  annotations:
    iam.gke.io/gcp-service-account: platform-api-wi@infra-learning-pdtung1605.iam.gserviceaccount.com

image:
  tag: "5bc4e5de"

# ---- Canary deployment (Argo Rollouts) ----
rollout:
  enabled: true
  canary:
    steps:
      - setWeight: 20
      - pause: { duration: 60s }
      - setWeight: 50
      - pause: { duration: 60s }
      - setWeight: 100
