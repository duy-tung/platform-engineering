# Grafana Tempo — single binary mode for trace storage
# Lightweight config for e2-medium Spot nodes
#
# Receives traces from OTel Collector via OTLP gRPC
# Grafana queries Tempo directly

tempo:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  # extraArgs must be a map, not a list (Tempo Helm chart spec)
  extraArgs:
    config.expand-env: "true"
  retention: 48h
  # Disable mem-ballast — not needed for small deployments and wastes RAM
  memBallastSizeMbs: 0

  # Storage: local filesystem with PVC
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
      wal:
        path: /var/tempo/wal

  tolerations:
    - key: "spot"
      operator: "Equal"
      value: "true"
      effect: "PreferNoSchedule"

persistence:
  enabled: true
  size: 5Gi
  accessModes:
    - ReadWriteOnce

# Receive OTLP traces
traces:
  otlp:
    grpc:
      enabled: true
    http:
      enabled: true
