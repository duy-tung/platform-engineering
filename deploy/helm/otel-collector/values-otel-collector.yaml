# OpenTelemetry Collector — receives traces from apps, forwards to Tempo
# Lean deployment mode for e2-medium Spot nodes

mode: deployment
replicaCount: 1

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

tolerations:
  - key: "spot"
    operator: "Equal"
    value: "true"
    effect: "PreferNoSchedule"

# Ports exposed by the collector
ports:
  otlp:
    enabled: true
    containerPort: 4317    # gRPC
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318    # HTTP
    servicePort: 4318
    protocol: TCP
  # Disable unused ports
  jaeger-compact:
    enabled: false
  jaeger-thrift:
    enabled: false
  jaeger-grpc:
    enabled: false
  zipkin:
    enabled: false

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  processors:
    batch:
      send_batch_size: 512
      timeout: 5s
    memory_limiter:
      check_interval: 5s
      limit_mib: 100
      spike_limit_mib: 20

  exporters:
    otlp/tempo:
      endpoint: tempo.monitoring:4317
      tls:
        insecure: true

  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [otlp/tempo]
