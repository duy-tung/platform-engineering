# kube-prometheus-stack — production config with observability deep dive
# Includes: Prometheus, Grafana (with Tempo + Loki datasources), AlertManager (Slack)
prometheus:
  prometheusSpec:
    retention: 7d
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    # Tolerate app-pool nodes
    tolerations:
      - key: "spot"
        operator: "Equal"
        value: "true"
        effect: "PreferNoSchedule"
    # Enable exemplar storage — links metrics to traces
    enableFeatures:
      - exemplar-storage
    # Scrape pods with prometheus.io annotations
    additionalScrapeConfigs:
      - job_name: 'pod-annotations'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod

grafana:
  adminPassword: "admin"  # Change in prod
  # Serve Grafana under /grafana sub-path behind GKE L7 LB
  grafana.ini:
    server:
      domain: platform.duy-tung.dev
      root_url: "%(protocol)s://%(domain)s/grafana/"
      serve_from_sub_path: true
  # Probes must use sub-path
  readinessProbe:
    httpGet:
      path: /grafana/api/health
      port: 3000
  livenessProbe:
    httpGet:
      path: /grafana/api/health
      port: 3000
    initialDelaySeconds: 60
    timeoutSeconds: 30
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  tolerations:
    - key: "spot"
      operator: "Equal"
      value: "true"
      effect: "PreferNoSchedule"

  # ---- Additional Datasources (Tempo for traces, Loki for logs) ----
  additionalDataSources:
    - name: Tempo
      type: tempo
      uid: tempo
      url: http://tempo.monitoring:3100
      access: proxy
      isDefault: false
      jsonData:
        tracesToMetrics:
          datasourceUid: prometheus
          tags:
            - key: service.name
              value: service_name
        serviceMap:
          datasourceUid: prometheus
        nodeGraph:
          enabled: true
    - name: Loki
      type: loki
      uid: loki
      url: http://loki.monitoring:3100
      access: proxy
      isDefault: false
      jsonData:
        derivedFields:
          - name: TraceID
            matcherRegex: '"trace_id":"(\w+)"'
            url: "$${__value.raw}"
            datasourceUid: tempo

  # ---- Dashboard sidecar — auto-loads ConfigMaps with grafana_dashboard=1 ----
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      folder: /tmp/dashboards
      folderAnnotation: grafana_dashboard_folder
      provider:
        foldersFromFilesStructure: false

# ---- AlertManager — Slack integration ----
alertmanager:
  config:
    global:
      resolve_timeout: 5m
    receivers:
      - name: 'default'
        slack_configs:
          - channel: '#platform-alerts'
            send_resolved: true
            title: '{{ if eq .Status "firing" }}🔥{{ else }}✅{{ end }} {{ .CommonLabels.alertname }}'
            text: >-
              {{ range .Alerts }}
              *Severity:* `{{ .Labels.severity }}`
              *Summary:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              {{ end }}
            api_url_file: /etc/alertmanager/secrets/slack-webhook-url/url
      - name: 'null'
    route:
      receiver: 'default'
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - match:
            alertname: Watchdog
          receiver: 'null'
  alertmanagerSpec:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
    tolerations:
      - key: "spot"
        operator: "Equal"
        value: "true"
        effect: "PreferNoSchedule"

# Node exporter on all nodes
nodeExporter:
  tolerations:
    - effect: NoSchedule
      operator: Exists

# Lightweight kube-state-metrics
kube-state-metrics:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

# Disable admission webhook patch/create Jobs — they block ArgoCD sync
# on resource-constrained clusters (Job pod can't schedule)
prometheusOperator:
  admissionWebhooks:
    enabled: false
  tls:
    enabled: false
